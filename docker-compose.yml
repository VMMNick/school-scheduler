version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 20671861
      POSTGRES_DB: school_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 20671861

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:20671861@postgres:5432/school_db
      REDIS_HOST: redis
      REDIS_PASSWORD: 20671861
      NODE_ENV: production

volumes:
  postgres_data: